version: '3.8'

services:
  # PostgreSQL Database
  evolution-postgres:
    image: postgres:15
    container_name: evolution-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-evolution}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-evolution123}
      POSTGRES_DB: ${DB_NAME:-evolution}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - evolution-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  evolution-redis:
    image: redis:7
    container_name: evolution-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - evolution-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Evolution API
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      evolution-postgres:
        condition: service_healthy
      evolution-redis:
        condition: service_healthy
    environment:
      # API Config
      AUTHENTICATION_API_KEY: ${API_KEY:-akh8wh3pze0v6f3oc3m55l}
      AUTHENTICATION_TYPE: apikey
      SERVER_URL: ${SERVER_URL:-http://localhost:8080}
      TZ: America/Sao_Paulo
      DOCKER_ENV: "true"

      # Database Config
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_CLIENT_NAME: evolution_exchange
      DATABASE_CONNECTION_URI: postgresql://${DB_USER:-evolution}:${DB_PASSWORD:-evolution123}@evolution-postgres:5432/${DB_NAME:-evolution}?schema=public
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"

      # Redis Cache Config
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CACHE_REDIS_URI: redis://evolution-redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution

      # WhatsApp Config
      CONFIG_SESSION_PHONE_VERSION: "2.3000.1032750324"

      # Instance Config
      DEL_INSTANCE: "false"

    networks:
      - evolution-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  evolution-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
